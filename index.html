<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Parking Master 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div id="hud-top">
            <div class="hud-box" id="money-box">
                <div class="hud-label">المال</div>
                <div class="hud-val" id="money-val">$1000</div>
            </div>
            <div class="hud-box" id="timer-box">
                <div class="hud-label">الوقت</div>
                <div class="hud-val" id="timer-val">00:00</div>
            </div>
            <div class="hud-box" id="mission-box">
                <div class="hud-label">المهمة</div>
                <div class="hud-val" id="mission-val">-</div>
            </div>
        </div>

        <div id="speedo">
            <canvas id="speedo-canvas" width="120" height="120"></canvas>
            <div id="gear-box">N</div>
        </div>

        <div id="damage-hud">
            <div id="damage-bg"><div id="damage-fill"></div></div>
            <div id="damage-text">100%</div>
        </div>

        <div id="compass">
            <canvas id="compass-canvas" width="100" height="30"></canvas>
        </div>

        <div id="hint-box" class="hidden">
            <div id="hint-text">اركن في المكان المحدد</div>
        </div>

        <div id="dist-box" class="hidden">
            <span id="dist-arrow">▲</span>
            <span id="dist-val">0m</span>
        </div>

        <div id="minimap-container">
            <canvas id="minimap" width="120" height="120"></canvas>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls">
        <div id="left-controls">
            <button id="btn-left" class="ctrl-btn steer">◀</button>
            <button id="btn-right" class="ctrl-btn steer">▶</button>
        </div>
        <div id="right-controls">
            <button id="btn-gas" class="ctrl-btn gas">▲<small>غاز</small></button>
            <button id="btn-brake" class="ctrl-btn brake">■<small>فرامل</small></button>
            <button id="btn-reverse" class="ctrl-btn rev">▼<small>خلف</small></button>
        </div>
        <div id="center-controls">
            <button id="btn-cam" class="ctrl-btn mini">CAM</button>
            <button id="btn-park" class="ctrl-btn mini">P</button>
        </div>
    </div>

    <!-- Start -->
    <div id="menu-screen">
        <div class="menu-bg"></div>
        <div class="menu-box">
            <div class="menu-logo">
                <div class="logo-3d">P</div>
            </div>
            <h1>PARKING MASTER</h1>
            <h2>3D PRO</h2>
            <p>ماستر الركن ثلاثي الأبعاد</p>
            <button id="btn-play" class="big-btn">ابدأ اللعب</button>
            <button id="btn-garage" class="big-btn sec">المعرض</button>
        </div>
    </div>

    <!-- Garage -->
    <div id="garage-screen" class="hidden">
        <div class="menu-bg"></div>
        <div class="menu-box wide">
            <div class="gar-head">
                <button id="btn-gar-back" class="sm-btn">رجوع</button>
                <h2>معرض السيارات</h2>
                <div id="gar-money" class="money-tag">$1000</div>
            </div>
            <div id="cars-list"></div>
        </div>
    </div>

    <!-- Missions -->
    <div id="missions-screen" class="hidden">
        <div class="menu-bg"></div>
        <div class="menu-box wide">
            <h2>المهمات</h2>
            <div id="miss-list"></div>
            <button id="btn-miss-back" class="sm-btn">رجوع</button>
        </div>
    </div>

    <!-- Result -->
    <div id="result-screen" class="hidden">
        <div class="menu-bg res-bg"></div>
        <div class="menu-box">
            <div id="res-stars" class="stars"></div>
            <h2 id="res-title">احسنت</h2>
            <div id="res-info"></div>
            <div id="res-reward" class="reward"></div>
            <button id="btn-res-next" class="big-btn">التالي</button>
            <button id="btn-res-menu" class="big-btn sec">القائمة</button>
        </div>
    </div>

    <!-- Fail -->
    <div id="fail-screen" class="hidden">
        <div class="menu-bg fail-bg"></div>
        <div class="menu-box">
            <div class="fail-x">✕</div>
            <h2>فشلت</h2>
            <p id="fail-why">-</p>
            <button id="btn-fail-retry" class="big-btn">اعادة</button>
            <button id="btn-fail-menu" class="big-btn sec">القائمة</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
